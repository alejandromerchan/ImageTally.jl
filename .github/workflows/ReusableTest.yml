name: Reusable test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: "1"
      os:
        required: false
        type: string
        default: ubuntu-latest
      arch:
        required: false
        type: string
        default: x64
      allow_failure:
        required: false
        type: boolean
        default: false
      run_codecov:
        required: false
        type: boolean
        default: false
      use_display:
        required: false
        type: boolean
        default: false
    secrets:
      codecov_token:
        required: true

jobs:
  test:
    name: Julia ${{ inputs.version }} - ${{ inputs.os }} - ${{ inputs.arch }} - ${{ github.event_name }}
    runs-on: ${{ inputs.os }}
    continue-on-error: ${{ inputs.allow_failure }}

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ inputs.version }}
          arch: ${{ inputs.arch }}
      - name: Use Julia cache
        uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Instantiate test environment with GUI dependencies (GUI tests only)
        if: ${{ inputs.use_display }}
        run: julia --project=test -e 'import Pkg; Pkg.instantiate()'
      - name: Install Xvfb (Linux GUI tests only)
        if: ${{ inputs.use_display && runner.os == 'Linux' }}
        run: sudo apt-get update -qq && sudo apt-get install -y xvfb
      - name: Run tests with GLMakie and virtual display (Linux GUI)
        if: ${{ inputs.use_display && runner.os == 'Linux' }}
        env:
          IMAGETALLY_TEST_GUI: "true"
        run: xvfb-run -s "-screen 0 1024x768x24" julia --project --code-coverage=user -e 'import Pkg; Pkg.test(coverage=true)'
      - name: Run logic tests (no GLMakie required)
        if: ${{ !inputs.use_display }}
        uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        if: ${{ inputs.run_codecov }}
      - uses: codecov/codecov-action@v6
        if: ${{ inputs.run_codecov }}
        with:
          files: lcov.info
          token: ${{ secrets.codecov_token }}
