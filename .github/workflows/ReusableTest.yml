name: Reusable test

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: "1"
      os:
        required: false
        type: string
        default: ubuntu-latest
      arch:
        required: false
        type: string
        default: x64
      allow_failure:
        required: false
        type: boolean
        default: false
      run_codecov:
        required: false
        type: boolean
        default: false
    secrets:
      codecov_token:
        required: true

jobs:
  test:
    name: Julia ${{ inputs.version }} - ${{ inputs.os }} - ${{ inputs.arch }} - ${{ github.event_name }}
    runs-on: ${{ inputs.os }}
    continue-on-error: ${{ inputs.allow_failure }}

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ inputs.version }}
          arch: ${{ inputs.arch }}
      - name: Use Julia cache
        uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Install Xvfb (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y xvfb
      - name: Run tests (Linux with virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run -s "-screen 0 1024x768x24" julia --project --code-coverage=user -e 'import Pkg; Pkg.test(coverage=true)'
      - name: Run tests (non-Linux)
        if: runner.os != 'Linux'
        uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        if: ${{ inputs.run_codecov }}
      - uses: codecov/codecov-action@v6
        if: ${{ inputs.run_codecov }}
        with:
          files: lcov.info
          token: ${{ secrets.codecov_token }}
